name: Expense Tracker CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────
  # Build & Push Docker Images
  # ─────────────────────────────────────────
  docker-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    # Only push images on direct pushes to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:

      # ─────────────────────────────────────
      # Checkout Repository
      # ─────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ─────────────────────────────────────
      # Setup Docker Buildx
      # Required for GitHub Actions cache
      # ─────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────
      # Login to Docker Hub
      # ─────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ─────────────────────────────────────
      # Build & Push Backend Image
      # Dockerfile handles Maven packaging
      # ─────────────────────────────────────
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true

          tags: |
            ${{ secrets.DOCKER_USERNAME }}/expense-tracker:latest
            ${{ secrets.DOCKER_USERNAME }}/expense-tracker:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────
      # Build & Push Frontend Image
      # ─────────────────────────────────────
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true

          tags: |
            ${{ secrets.DOCKER_USERNAME }}/expense-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/expense-frontend:${{ github.sha }}

          build-args: |
            VITE_API_BASE_URL=/api/v1/

          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────
      # Print Image References
      # ─────────────────────────────────────
      - name: Print Image Tags
        run: |
          echo "=================================="
          echo "Docker Images Successfully Pushed"
          echo "=================================="

          echo ""
          echo "Backend:"
          echo "${{ secrets.DOCKER_USERNAME }}/expense-tracker:latest"
          echo "${{ secrets.DOCKER_USERNAME }}/expense-tracker:${{ github.sha }}"

          echo ""
          echo "Frontend:"
          echo "${{ secrets.DOCKER_USERNAME }}/expense-frontend:latest"
          echo "${{ secrets.DOCKER_USERNAME }}/expense-frontend:${{ github.sha }}"
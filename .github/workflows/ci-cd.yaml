name: Expense Tracker CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ] # runs tests on PRs too, but won't deploy

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Test & Build Backend
  # ─────────────────────────────────────────
  backend-build:
    name: Test & Build Spring Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven # caches ~/.m2 between runs — faster builds

      - name: Run tests
        run: mvn test -f backend/pom.xml

      - name: Build JAR (skip tests, already ran above)
        run: mvn package -DskipTests -f backend/pom.xml

      # Upload JAR so next job can use it without rebuilding
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Docker Images
  # ─────────────────────────────────────────
  docker-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: backend-build # only runs if Job 1 passes
    if: github.ref == 'refs/heads/main' # only on main branch, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the JAR built in Job 1
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build backend image and tag with both commit SHA and 'latest'
      # SHA tag → traceable, rollback-friendly
      # latest tag → always points to newest build
      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/expense-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/expense-backend:${{ github.sha }}

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/expense-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/expense-frontend:${{ github.sha }}

      # Print the image tags for reference in logs
      - name: Print image tags
        run: |
          echo "Backend: ${{ secrets.DOCKER_USERNAME }}/expense-backend:${{ github.sha }}"
          echo "Frontend: ${{ secrets.DOCKER_USERNAME }}/expense-frontend:${{ github.sha }}"

apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: expense-tracker

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: arpanduari26/expense-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

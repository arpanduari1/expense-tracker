spring:
  application:
    name: expense-tracker

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL:jdbc:mysql://localhost:3307/expense_tracker_db}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST}

  mvc:
    view:
      prefix:
      suffix:

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: ${SHOW_DETAILS:never}

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

api:
  base: /api
  version: /v1

cloudinary:
  secret:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

gg:
  jte:
    templateLocation: classpath:/templates/
    templateSuffix: .jte
    developmentMode: ${JTE_DEV_MODE:true}
    usePrecompiledTemplates: false

app:
  queue:
    otp: otpQueue
    forgot-password: forgotPasswordQueue
    reset-password: resetPasswordQueue
    change-password: changePasswordQueue
    account-created: accountCreatedQueue
    profile-event: profileEventQueue

  frontend:
    path: https://expensewise2025.netlify.app

  logo: https://i.imghippo.com/files/SuCD1097ccM.png
  static-logo: expense-wise-logo.png
  cors:
    allowed-origins: "https://expensewise2025.netlify.app, http://localhost:3000, http://localhost:3001"

  android:
    deeplink:
      scheme: dev.expensewise.android
    package: dev.expensewise.android
    scheme: expensewise

  google:
    android:
      client-id: ${GOOGLE_CLIENT_ID}

  notification:
    firebase:
      service-account-json: ${FIREBASE_SERVICE_ACCOUNT}

  backend:
    path: https://expense-tracker-1p6d.onrender.com

name: Build docker image and deploy to render

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: set up jdk 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with maven
        run: mvn clean package -DskipTests

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v2

      - name: login to dockerhub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker:latest

      - name: Extract docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker

      - name: Build and push docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker:latest
          cache-to: type=inline

      - name: Deploy to render
        run: |
          echo "Deploying to render..."
          curl -X POST -d {} ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait until app is live
        run: |
          echo "Waiting for app to become healthy..."
          sleep 120 
          for i in {1..30}; do
            STATUS=$(curl -s https://expense-tracker-1p6d.onrender.com/actuator/health | grep UP || true)
            if [ "$STATUS" != "" ]; then
              echo "App is live!"
              exit 0
            fi
            echo "Still starting..."
            sleep 6
          done
          echo "App failed to start in time"
          exit 1

      - name: Send Telegram Success Notification
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
               -H "Content-Type: application/json" \
               -d '{
                 "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
                 "parse_mode": "HTML",
                 "text": "<b>🚀 ExpenseWise Deployment Successful!</b>\n\n<b>📦 Docker Image:</b> <code>${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker:latest</code>\n<b>🔖 Commit:</b> <code>'"${GITHUB_SHA:0:7}"'</code>\n<b>💬 Message:</b> '"${COMMIT_MSG}"'\n<b>🌿 Branch:</b> <code>${{ github.ref_name }}</code>\n<b>👤 Deployed by:</b> ${{ github.actor }}\n<b>🕐 Time:</b> '"$(date -u +'%Y-%m-%d %H:%M:%S UTC')"'\n\n✅ App is now live on Render!",
                 "reply_markup": {
                   "inline_keyboard": [[
                     {"text": "🔗 View on Render", "url": "https://dashboard.render.com"},
                     {"text": "📋 View Logs", "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                   ]]
                 }
               }'

      - name: Send Telegram Failure Notification
        if: failure()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
               -H "Content-Type: application/json" \
               -d '{
                 "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
                 "parse_mode": "HTML",
                 "text": "<b>❌ ExpenseWise Deployment Failed!</b>\n\n<b>🔖 Commit:</b> <code>'"${GITHUB_SHA:0:7}"'</code>\n<b>💬 Message:</b> '"${COMMIT_MSG}"'\n<b>🌿 Branch:</b> <code>${{ github.ref_name }}</code>\n<b>👤 Triggered by:</b> ${{ github.actor }}\n<b>🕐 Time:</b> '"$(date -u +'%Y-%m-%d %H:%M:%S UTC')"'\n\n⚠️ Please check the logs to debug the issue.",
                 "reply_markup": {
                   "inline_keyboard": [[
                     {"text": "🔍 Check Logs", "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"},
                     {"text": "📊 View Commit", "url": "https://github.com/${{ github.repository }}/commit/${{ github.sha }}"}
                   ]]
                 }
               }'